{% extends base_template|default:'base.html' %}

{% block title %}Hainna - Log Fuel Fill-up{% endblock %}

{% block content %}
<div class="h-full overflow-y-auto bg-[#0A0B10] custom-scrollbar p-10">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col items-start gap-4 mb-10">
            <button hx-get="{% url 'fuel' %}" hx-target="main" hx-push-url="true" class="text-[10px] font-black uppercase tracking-[0.2em] text-white/40 hover:text-white flex items-center gap-2 transition-colors">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Directory
            </button>
            <div>
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-500 mb-2">New Entry</h3>
                <h2 class="text-4xl font-black text-white tracking-tight">Log Fuel Fill-up</h2>
            </div>
        </div>

        <div class="bg-black/40 border border-white/10 rounded-3xl overflow-hidden shadow-2xl">
            <!-- decorative header -->
            <div class="h-2 w-full bg-gradient-to-r from-blue-600 to-indigo-500"></div>
            
            <form class="p-10 space-y-10" hx-post="{% url 'add_fuel' %}" hx-target="main" hx-push-url="{% url 'fuel' %}">
                {% csrf_token %}
                
                <div>
                    <h4 class="text-xs font-black uppercase tracking-[0.2em] text-white border-b border-white/10 pb-4 mb-6">Fuel Log Details</h4>
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-white/30 ml-1">Vehicle Unit</label>
                                <input type="text" placeholder="e.g. Unit #05" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white placeholder:text-white/10 focus:outline-none focus:border-blue-500/50 transition-all">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-white/30 ml-1">Fuel Type</label>
                                <select class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white focus:outline-none focus:border-blue-500/50 transition-all appearance-none cursor-pointer">
                                    <option class="bg-[#0A0B10]">Diesel</option>
                                    <option class="bg-[#0A0B10]">Unleaded</option>
                                    <option class="bg-[#0A0B10]">Premium</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-white/30 ml-1">Liters</label>
                                <input type="number" step="0.01" placeholder="e.g. 80.00" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white placeholder:text-white/10 focus:outline-none focus:border-blue-500/50 transition-all">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-white/30 ml-1">Price per Liter (₱)</label>
                                <input type="number" step="0.01" placeholder="e.g. 58.35" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white placeholder:text-white/10 focus:outline-none focus:border-blue-500/50 transition-all">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-white/30 ml-1">Current Odometer (km)</label>
                                <input type="number" placeholder="e.g. 45821" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white placeholder:text-white/10 focus:outline-none focus:border-blue-500/50 transition-all">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-white/30 ml-1">Date</label>
                                <input type="date" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-bold text-white focus:outline-none focus:border-blue-500/50 transition-all [color-scheme:dark]">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-6 border-t border-white/10 flex justify-end gap-4">
                    <button type="button" hx-get="{% url 'fuel' %}" hx-target="main" hx-push-url="true" class="px-8 py-4 rounded-xl border border-white/10 text-[11px] font-black uppercase tracking-widest text-white/40 hover:bg-white/5 hover:text-white transition-all">Cancel</button>
                    <button type="submit" class="px-12 py-4 rounded-xl bg-blue-600 text-white text-[11px] font-black uppercase tracking-widest shadow-lg shadow-blue-500/20 hover:bg-blue-500 transition-all">Save Log</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>
{% endblock %}
