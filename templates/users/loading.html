{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initializing Session | Hainna Admin Console</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes pulse-ring {
            0% { transform: scale(.33); }
            80%, 100% { opacity: 0; }
        }
        @keyframes pulse-dot {
            0% { transform: scale(.8); }
            50% { transform: scale(1); }
            100% { transform: scale(.8); }
        }
        .loading-ring {
            position: relative;
            width: 120px;
            height: 120px;
        }
        .loading-ring:before {
            content: '';
            position: absolute;
            left: -20px;
            top: -20px;
            width: 160px;
            height: 160px;
            background-color: rgba(37, 99, 235, 0.4);
            border-radius: 50%;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .loading-dot {
            position: relative;
            display: block;
            width: 120px;
            height: 120px;
            background-color: #2563eb;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(37, 99, 235, 0.6);
            animation: pulse-dot 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) -.4s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .progress-container {
            width: 240px;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 40px;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #60a5fa);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.5);
            transition: width 2.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-black min-h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-black to-black text-white/90">

    <div class="loading-ring">
        <div class="loading-dot">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
        </div>
    </div>

    <div class="mt-12 text-center">
        <h1 class="text-3xl font-black tracking-[0.3em] uppercase mb-4 animate-pulse">Initializing</h1>
        <p id="status-text" class="text-[10px] font-black uppercase tracking-[0.4em] text-blue-500/80 mb-6 transition-all duration-500">Connecting to Astra Secure Cloud...</p>
        
        <div class="progress-container mx-auto">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        
        <div class="mt-8 flex items-center justify-center gap-4 opacity-30">
            <span class="text-[10px] font-bold uppercase tracking-widest">Assets</span>
            <div class="w-1 h-1 bg-white rounded-full"></div>
            <span class="text-[10px] font-bold uppercase tracking-widest">Maps</span>
            <div class="w-1 h-1 bg-white rounded-full"></div>
            <span class="text-[10px] font-bold uppercase tracking-widest">Fleet</span>
        </div>
    </div>

    <script shadow>
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        
        const phases = [
            { text: "Loading Core Engine...", delay: 0 },
            { text: "Fetching Live Fleet Data...", delay: 800 },
            { text: "Caching Map Cartography...", delay: 1500 },
            { text: "Synchronizing Session...", delay: 2200 },
            { text: "Access Granted. Welcome.", delay: 2800 }
        ];

        // Start progress
        setTimeout(() => {
            progressBar.style.width = '100%';
        }, 100);

        // Rotate status text
        phases.forEach(phase => {
            setTimeout(() => {
                statusText.textContent = phase.text;
                statusText.style.transform = 'translateY(-2px)';
                setTimeout(() => statusText.style.transform = 'translateY(0)', 100);
            }, phase.delay);
        });

        // Redirect
        setTimeout(() => {
            window.location.href = "{% url 'dashboard' %}";
        }, 3200);
    </script>
</body>
</html>
