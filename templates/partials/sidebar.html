<div class="flex flex-col h-full bg-base-200" x-data="{ activeTab: window.location.pathname.includes('live-tracking') ? 'tracking' : 'dashboard' }">
    <div class="p-4 flex-1 overflow-y-auto">
        <ul class="menu menu-md w-full gap-1 p-0">
            <li class="menu-title text-xs font-bold uppercase tracking-widest text-base-content/40 mt-2 mb-1">Main Navigation</li>
            <li>
                <a href="{% url 'dashboard' %}" 
                   hx-get="{% url 'dashboard' %}" 
                   hx-target="main" 
                   hx-push-url="true"
                   :class="{ 'active': activeTab === 'dashboard' }"
                   @click="activeTab = 'dashboard'"
                   class="flex items-center gap-3 py-3">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    <span class="font-medium">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="{% url 'live_tracking' %}" 
                   hx-get="{% url 'live_tracking' %}" 
                   hx-target="main" 
                   hx-push-url="true"
                   :class="{ 'active': activeTab === 'tracking' }"
                   @click="activeTab = 'tracking'"
                   class="flex items-center gap-3 py-3">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    <span class="font-medium">Live Tracking</span>
                    <span class="badge badge-sm badge-info font-bold ml-auto text-[10px]">LIVE</span>
                </a>
            </li>
            <li class="menu-title text-xs font-bold uppercase tracking-widest text-base-content/40 mt-6 mb-1">Internal Operations</li>
            <li>
                <a href="#" class="flex items-center gap-3 py-3">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span class="font-medium">Personnel</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- User Section -->
    <div class="mt-auto p-4 border-t border-white/5 bg-base-300/50">
        <div class="flex items-center gap-3">
            <div class="avatar placeholder">
                <div class="bg-blue-600/20 text-blue-600 rounded-full w-10">
                    <span class="text-xs font-bold">JD</span>
                </div>
            </div>
            <div class="flex-1 overflow-hidden">
                <p class="text-sm font-bold truncate text-white">Jane Doe</p>
                <p class="text-[10px] text-base-content/50 uppercase tracking-tighter">System Admin</p>
            </div>
        </div>
    </div>
</div>
