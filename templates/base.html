{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hainna Admin Console{% endblock %}</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <!-- JS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .leaflet-container { background: #0f172a !important; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-base-300 text-base-content min-h-screen overflow-hidden"
      x-data="{
          activeTab: 'dashboard',
          init() {
              const path = window.location.pathname;
              if (path.includes('live-tracking')) this.activeTab = 'tracking';
              else if (path.includes('fleet-vehicles')) this.activeTab = 'fleet';
              else if (path.includes('drivers')) this.activeTab = 'drivers';
              else this.activeTab = 'dashboard';

              document.addEventListener('htmx:afterOnLoad', () => {
                  const newPath = window.location.pathname;
                  if (newPath.includes('live-tracking')) this.activeTab = 'tracking';
                  else if (newPath.includes('fleet-vehicles')) this.activeTab = 'fleet';
                  else if (newPath.includes('drivers')) this.activeTab = 'drivers';
                  else this.activeTab = 'dashboard';
              });
          }
      }">

    <div class="flex flex-col h-screen overflow-hidden">
        {% include 'partials/topnav.html' %}

        <!-- Sidebar & Main Content -->
        <div class="flex-1 flex overflow-hidden relative">
            <!-- Sidebar (Desktop) -->
            <aside class="hidden lg:flex w-72 h-full bg-base-200 border-r border-white/5 flex-col overflow-hidden shrink-0">
                {% include 'partials/sidebar.html' %}
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 relative overflow-hidden bg-black">
                {% block content %}{% endblock %}
            </main>

            <!-- Mobile Drawer (Overlay) -->
            <div class="drawer lg:hidden absolute inset-0 z-[1050] pointer-events-none">
                <input id="my-drawer-2" type="checkbox" class="drawer-toggle pointer-events-auto" />
                <div class="drawer-side h-full pointer-events-auto">
                    <label for="my-drawer-2" aria-label="close sidebar" class="drawer-overlay"></label>
                    <div class="w-72 h-full bg-base-200 flex flex-col overflow-hidden">
                        {% include 'partials/sidebar.html' %}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const clockEl = document.getElementById('clock');
            if (clockEl) clockEl.textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
