services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=hainna
      - POSTGRES_USER=hainna_user
      - POSTGRES_PASSWORD=hainna_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hainna_user -d hainna"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-True}
      - PRODUCTION=${PRODUCTION:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgres://hainna_user:hainna_password@db:5432/hainna}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,app}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-False}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-False}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-False}
      - SECURE_HSTS_SECONDS=${SECURE_HSTS_SECONDS:-0}
      - SECURE_PROXY_SSL_HEADER=${SECURE_PROXY_SSL_HEADER:-HTTP_X_FORWARDED_PROTO,https}
      - USE_X_FORWARDED_HOST=${USE_X_FORWARDED_HOST:-True}
    networks:
      - default
      - proxy-nw
    depends_on:
      - db
      - traccar

  traccar:
    image: traccar/traccar:latest
    container_name: traccar_service
    volumes:
      - traccar_data:/opt/traccar/data
    ports:
      - "8082:8082"
      - "5000-5150:5000-5150/tcp"
      - "5000-5150:5000-5150/udp"
    networks:
      - default
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume:
  traccar_data:

networks:
  default:
  proxy-nw:
    external: true
